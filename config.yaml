arxiv:
  categories: [quant-ph]
  # 抓取论文数量上限；null = 全部抓取，不设上限
  # 设为整数（如 10）可限制每天处理的论文数量，适合测试或节省 API 调用
  # 命令行 --max-results 会覆盖此值
  max_results: 1

llm:
  model: glm-4-flash
  max_retries: 3

schedule:
  time: "08:00"
  timezone: "Europe/Copenhagen"

output:
  directory: ./output
  formats: [markdown]

email:
  enabled: true
  smtp_host: mail.ustc.edu.cn
  smtp_port: 465
  smtp_security: ssl             # ssl | starttls | none
  # 收件人列表；可通过环境变量 SMTP_RECIPIENTS（逗号分隔）覆盖
  recipients: [bx030108wbx@mail.ustc.edu.cn]
