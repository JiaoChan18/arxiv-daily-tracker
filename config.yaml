arxiv:
  categories: [quant-ph]
  max_results: null          # null = 全部抓取，不设上限

llm:
  model: glm-4-flash
  max_retries: 3

schedule:
  time: "08:00"
  timezone: "Europe/Copenhagen"

output:
  directory: ./output
  formats: [markdown]

email:
  enabled: true
  smtp_host: smtp.gmail.com
  smtp_port: 465
  smtp_security: ssl             # ssl | starttls | none
  # 收件人列表；可通过环境变量 SMTP_RECIPIENTS（逗号分隔）覆盖
  recipients: []
