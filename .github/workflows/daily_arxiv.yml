name: Daily arXiv Tracker

on:
  schedule:
    # Daily at UTC 01:00 — stable across CET/CEST (DST). arXiv listing is
    # complete well before this fires. GitHub cron is best-effort and may
    # drift by several minutes under load.
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # Set NOTIFY_MODE in GitHub → Settings → Variables → Actions to switch modes.
      # obsidian (default): sync Markdown to Obsidian vault repo via Git push.
      # email:             send PDF + Markdown via SMTP; skip vault sync.
      # both:              send email AND sync to vault via Git push.
      NOTIFY_MODE: ${{ vars.NOTIFY_MODE || 'obsidian' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # PDF generation is temporarily disabled; re-enable this step and restore
      # "pdf" to config.yaml output.formats when PDF output is needed again.
      # - name: Install system packages for pandoc + xelatex (CJK)
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y --no-install-recommends \
      #       pandoc \
      #       texlive-xetex \
      #       texlive-latex-recommended \
      #       texlive-lang-chinese \
      #       texlive-science \
      #       fonts-noto-cjk \
      #       lmodern

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv daily pipeline
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python main.py

      - name: Checkout Obsidian Vault
        if: contains(fromJSON('["obsidian", "both", ""]'), env.NOTIFY_MODE)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.OBSIDIAN_VAULT_REPO }}
          token: ${{ secrets.OBSIDIAN_SYNC_TOKEN }}
          path: obsidian_vault

      - name: Push to Obsidian Repo
        if: contains(fromJSON('["obsidian", "both", ""]'), env.NOTIFY_MODE)
        run: |
          YEAR=$(date +'%Y')
          DEST_DIR="obsidian_vault/50_Sync_git/arxiv/$YEAR"
          mkdir -p "$DEST_DIR"
          cp -r output/**/*.md "$DEST_DIR/" 2>/dev/null || cp output/*.md "$DEST_DIR/" || true
          cd obsidian_vault
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --quiet --staged; then
            git commit -m "Auto-sync arXiv daily report for $YEAR"
            git push
          fi

      - name: Upload output directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-output-${{ github.run_id }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
