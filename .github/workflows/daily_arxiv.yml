name: Daily arXiv Tracker

on:
  schedule:
    # Daily at UTC 01:00 — stable across CET/CEST (DST). arXiv listing is
    # complete well before this fires. GitHub cron is best-effort and may
    # drift by several minutes under load.
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system packages for pandoc + xelatex (CJK)
        # Package set mandated by renderer/pdf_exporter.py for Chinese PDF rendering.
        # texlive-latex-recommended + lmodern provide lmodern.sty required by xelatex.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-lang-chinese \
            texlive-science \
            fonts-noto-cjk \
            lmodern

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv daily pipeline
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Set NOTIFY_MODE in GitHub → Settings → Variables → Actions to switch modes.
          # obsidian (default): skip email, rely on vault/ Git sync below.
          # email or both: also send PDF + Markdown via Gmail.
          NOTIFY_MODE: ${{ vars.NOTIFY_MODE || 'obsidian' }}
        run: python main.py

      - name: Sync Markdown reports to vault/
        # Copy generated .md files into vault/ so Obsidian (Git-backed) picks them up.
        # output/YYYY-MM-DD/quant-ph-YYYY-MM-DD.md → vault/YYYY-MM-DD/quant-ph-YYYY-MM-DD.md
        run: |
          find output -name "*.md" | while IFS= read -r f; do
            rel="${f#output/}"
            dest="vault/${rel}"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done

      - name: Auto-commit vault changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: add daily arXiv report (${{ github.run_id }})"
          file_pattern: vault/**

      - name: Upload output directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-output-${{ github.run_id }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
